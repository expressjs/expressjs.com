name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'deploy-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build and upload pages artifact
        uses: withastro/action@b7d53628f8b666036b0238aadb0b984a2a489f26 # v6
        with:
          path: .
          package-manager: npm
          out-dir: dist
        env:
          PUBLIC_ORAMA_PROJECT_ID: ${{ secrets.PUBLIC_ORAMA_PRODUCTION_PROJECT_ID }}
          PUBLIC_ORAMA_API_KEY: ${{ secrets.PUBLIC_ORAMA_PRODUCTION_API_KEY }}

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
