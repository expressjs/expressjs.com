name: ci

on:
  pull_request:
    branches:
    - gh-pages
  push:
    branches:
    - gh-pages

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Node.js dependencies
      run: npm install

    - name: Run tests
      shell: bash
      run: npm test

    - name: Check Docker support
      shell: bash
      run: |
        docker --version
        make build
