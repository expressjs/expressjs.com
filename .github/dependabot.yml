version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    groups:
      astro:
        patterns:
          - '@astrojs/*'
          - 'astro'
          - 'astro-*'
          - 'prettier-plugin-astro'
      linters:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'prettier'
          - 'typescript-eslint'
          - 'globals'
      production:
        dependency-type: production
        exclude-patterns:
          - '@astrojs/*'
          - 'astro'
          - 'astro-*'
      development:
        dependency-type: development
        exclude-patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'prettier'
          - 'prettier-plugin-astro'
          - 'typescript-eslint'
          - 'globals'
