<div class="desktop-lang-switcher">
  <button id="langBtn" class="lang-btn" type="button" aria-haspopup="menu" aria-label="Change language">
    {% include icons/i18n.svg %}
  </button>
  <ul id="langList" class="lang-list" aria-expanded="false">
    {% for lang in site.data.languages %}
    <li>
      <a href="/{{ lang.code }}/{{ url_remainder }}">
        {% if lang.code == current_lang %}
        <strong>{{ lang.name }}</strong>
        {% else %}
        {{ lang.name }}
        {% endif %}
      </a>
    </li>
    {% endfor %}
  </ul>
</div>
