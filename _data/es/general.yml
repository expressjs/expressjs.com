title_announcement: "Express@5.1.0: Ahora la versión por defecto en npm con cronograma LTS"
body_announcement: "Express 5.1.0 es ahora es la versión predeterminada en npm, y estamos introduciendo un cronograma oficial de LTS para las líneas de lanzamiento v4 y v5. <a href='https://expressjs.com/2025/03/31/v5-1-latest-release.html'>Mira nuestro último blog para más información.</a>"
