title_announcement: "Express@5.1.0: LTSタイムラインでnpmのデフォルトになりました"
body_announcement: "Express 5.1.0 が npm のデフォルトとなり、v4 および v5 リリース ラインの公式 LTS スケジュールが導入されます。<a href='https://expressjs.com/2025/03/31/v5-1-latest-release.html'>詳細については、最新のブログをご覧ください。</a>"
